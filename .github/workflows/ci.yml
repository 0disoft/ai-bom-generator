name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: Python ${{ matrix.python-version }} validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: "false"

      - name: Set up Bun
        if: matrix.python-version == '3.12'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install locked environment
        run: uv sync --locked

      - name: Compile sources
        run: uv run --python ${{ matrix.python-version }} python -m compileall -q src tests scripts

      - name: Lint sources
        run: uv run --python ${{ matrix.python-version }} ruff check src tests scripts

      - name: Run unit and contract tests
        run: uv run --python ${{ matrix.python-version }} python -m unittest discover -s tests -v

      - name: Test release tooling
        if: matrix.python-version == '3.12'
        run: bun test tools/release/lib.test.ts

      - name: Check bounded component performance
        if: matrix.python-version == '3.12'
        run: uv run --python 3.12 python scripts/benchmark_components.py --check --json

      - name: Build distributions
        run: uv build

      - name: Verify wheel contents
        run: uv run --python ${{ matrix.python-version }} python scripts/verify_wheel.py dist

      - name: Verify GitHub Action wrapper
        run: uv run --python ${{ matrix.python-version }} python scripts/verify_github_action.py

      - name: Smoke CLI fixture
        run: |
          set -euo pipefail
          out_dir="$(mktemp -d)"
          uv run --python ${{ matrix.python-version }} ai-bom generate \
            tests/fixtures/complete-project \
            --format cyclonedx-json-1.7 \
            --output "$out_dir/bom.cdx.json" \
            --warning-report "$out_dir/warnings.json" \
            --summary "$out_dir/summary.json"
          test -s "$out_dir/bom.cdx.json"
          test -s "$out_dir/warnings.json"
          test -s "$out_dir/summary.json"

      - name: Check repository diff hygiene
        run: git diff --check

  action-runtime-smoke:
    name: Action-managed runtime smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: ai-bom
        name: Run action without caller runtime setup
        uses: ./
        with:
          model-directory: tests/fixtures/complete-project
          warnings: allow

      - name: Verify managed-runtime outputs
        shell: bash
        env:
          RUNNER_OS_NAME: ${{ runner.os }}
        run: |
          set -euo pipefail
          printf 'Verified action-managed runtime on %s\n' "$RUNNER_OS_NAME"
          test -s "${{ steps.ai-bom.outputs.bom-path }}"
          test -s "${{ steps.ai-bom.outputs.warning-report-path }}"
          test -s "${{ steps.ai-bom.outputs.summary-path }}"
          test -s "${{ steps.ai-bom.outputs.manifest-path }}"
          test "${{ steps.ai-bom.outputs.exit-code }}" = "0"
          test "${{ steps.ai-bom.outputs.status }}" = "success"
