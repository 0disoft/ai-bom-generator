version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:17"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:27"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
    groups:
      github-actions:
        patterns:
          - "*"
