name: AI-BOM Generator
description: Generate an AI/ML bill of materials with the ai-bom CLI.

inputs:
  model-directory:
    description: Path to the model project directory.
    required: true
  config:
    description: >-
      Optional path to an explicit AI-BOM config file. Empty lets the CLI
      discover aibom.toml in the model directory.
    required: false
    default: ""
  format:
    description: Optional output format override passed to ai-bom. Leave empty to use config or CLI defaults.
    required: false
    default: ""
  output:
    description: Output path for the generated BOM. Defaults under RUNNER_TEMP.
    required: false
    default: ""
  warning-report:
    description: Output path for the warning report. Defaults under RUNNER_TEMP.
    required: false
    default: ""
  summary:
    description: Output path for the JSON summary. Defaults under RUNNER_TEMP.
    required: false
    default: ""
  manifest:
    description: Output path for the generation manifest. Defaults under RUNNER_TEMP.
    required: false
    default: ""
  error-report:
    description: Output path for the hard-failure JSON report. Defaults under RUNNER_TEMP.
    required: false
    default: ""
  warnings:
    description: Optional warning policy override passed to ai-bom. Leave empty to use config or CLI defaults.
    required: false
    default: ""
  redaction:
    description: Redaction mode passed to ai-bom.
    required: false
    default: strict

outputs:
  bom-path:
    description: Path to the generated BOM file.
    value: ${{ steps.generate.outputs['bom-path'] }}
  warning-report-path:
    description: Path to the generated warning report.
    value: ${{ steps.generate.outputs['warning-report-path'] }}
  summary-path:
    description: Path to the generated JSON summary.
    value: ${{ steps.generate.outputs['summary-path'] }}
  manifest-path:
    description: Path to the generated output manifest.
    value: ${{ steps.generate.outputs['manifest-path'] }}
  error-report-path:
    description: Path reserved for the hard-failure JSON report.
    value: ${{ steps.generate.outputs['error-report-path'] }}
  error-code:
    description: Stable error code from a verified hard-failure report when available.
    value: ${{ steps.generate.outputs['error-code'] }}
  error-stage:
    description: Failure stage from a verified hard-failure report when available.
    value: ${{ steps.generate.outputs['error-stage'] }}
  warning-count:
    description: Warning count reported by the JSON summary when available.
    value: ${{ steps.generate.outputs['warning-count'] }}
  status:
    description: Run status reported by the JSON summary when available.
    value: ${{ steps.generate.outputs.status }}
  completeness-status:
    description: Evidence completeness status reported by the JSON summary when available.
    value: ${{ steps.generate.outputs['completeness-status'] }}
  format:
    description: Output format reported by the JSON summary when available.
    value: ${{ steps.generate.outputs.format }}
  exit-code:
    description: ai-bom process exit code.
    value: ${{ steps.generate.outputs['exit-code'] }}

runs:
  using: composite
  steps:
    - name: Set up Python 3.12
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "0.11.28"
        enable-cache: "false"
        working-directory: ${{ github.action_path }}

    - id: generate
      name: Generate AI-BOM
      shell: bash
      env:
        INPUT_MODEL_DIRECTORY: ${{ inputs.model-directory }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_WARNING_REPORT: ${{ inputs.warning-report }}
        INPUT_SUMMARY: ${{ inputs.summary }}
        INPUT_MANIFEST: ${{ inputs.manifest }}
        INPUT_ERROR_REPORT: ${{ inputs.error-report }}
        INPUT_WARNINGS: ${{ inputs.warnings }}
        INPUT_REDACTION: ${{ inputs.redaction }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
      run: python "$GITHUB_ACTION_PATH/scripts/github_action_entrypoint.py"
